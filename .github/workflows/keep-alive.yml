name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: "*/10 * * * *" # Every 10 minutes
  workflow_dispatch:

jobs:
  ping-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit Apps
        run: |
          urls=(
            "https://lexguard-app.streamlit.app/"
            "https://f1-win-predictor-app.streamlit.app/"
            "https://autokpi-hk-app.streamlit.app/"
            "https://oncovision-akj8dwacntroekz8qxa7gs.streamlit.app/"
          )
          
          for url in "${urls[@]}"; do
            echo "Pinging $url..."
            # Make 3 requests to each app to simulate real traffic
            for i in {1..3}; do
              curl -L -s -o /dev/null -w "  Request $i: %{http_code}\n" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
                -H "Accept-Language: en-US,en;q=0.5" \
                -H "Connection: keep-alive" \
                "$url"
              sleep 2
            done
            echo "---"
          done
