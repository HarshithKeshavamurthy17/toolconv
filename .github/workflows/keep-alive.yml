name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch:

jobs:
  aggressive-wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgbm-dev libasound2 libnss3 libxss1 libatk-bridge2.0-0 libgtk-3-0 libgdk-pixbuf2.0-0 > /dev/null 2>&1

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run Aggressive Wake-Up Script
        run: node scripts/wake_up.js
