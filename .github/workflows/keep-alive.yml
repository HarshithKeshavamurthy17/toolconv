name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch:

jobs:
  aggressive-wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libasound2 libnss3 libxss1 libatk-bridge2.0-0 libgtk-3-0 libgdk-pixbuf2.0-0

      - name: Install Project Dependencies
        run: npm install

      - name: Run Aggressive Wake-Up Script
        run: npm run wake-up
